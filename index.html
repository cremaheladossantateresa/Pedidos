<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Crema Helados</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --fucsia: #ED068C;
            --verde: #5FDB00;
            --fondo: #F6F6F7;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--fondo); margin: 0; padding: 0; }
        header { background-color: var(--fucsia); color: white; text-align: center; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-weight: 700; text-transform: uppercase; font-size: 1.5rem; }
        .contenedor { max-width: 900px; margin: 20px auto; padding: 15px; }
        #estado { text-align: center; color: var(--fucsia); font-weight: bold; margin-bottom: 20px; font-size: 1.2rem; }
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card-categoria { background: white; border: 3px solid var(--fucsia); color: var(--fucsia); padding: 25px 15px; border-radius: 15px; text-align: center; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-categoria:hover { background-color: var(--fucsia); color: white; transform: translateY(-3px); }
    </style>
</head>
<body>

<header>
    <h1>Crema Helados</h1>
</header>

<div class="contenedor">
    <div id="estado">Cargando menú de Santa Teresa...</div>
    <div id="grid-principal" class="grid-menu"></div>
</div>

<script>
    // Configuración directa de tu base de datos según tu captura
    const firebaseConfig = {
        databaseURL: "https://pedidos-crema-helados-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Función para obtener las categorías reales de tu Firebase
    function cargarMenu() {
        database.ref('Categorias').once('value').then((snapshot) => {
            const categorias = snapshot.val();
            const grid = document.getElementById('grid-principal');
            const estado = document.getElementById('estado');
            
            grid.innerHTML = "";
            estado.innerText = "¡Hola Efrén! Selecciona una Categoría:";

            if (categorias) {
                // Recorremos los datos que vimos en tu captura de Realtime Database
                for(let id in categorias) {
                    const nombreCat = categorias[id].Nombre || categorias[id];
                    const div = document.createElement('div');
                    div.className = 'card-categoria';
                    div.innerText = nombreCat;
                    // Por ahora solo mostraremos el nombre, luego daremos el siguiente paso
                    grid.appendChild(div);
                }
            } else {
                estado.innerText = "No se encontraron categorías en la base de datos.";
            }
        }).catch(error => {
            document.getElementById('estado').innerText = "Error de conexión con Firebase";
            console.error(error);
        });
    }

    cargarMenu();
</script>
</body>
</html>
